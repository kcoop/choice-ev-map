name: Update Stations & Deploy

on:
  # Run nightly at 3am UTC
  schedule:
    - cron: '0 3 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Also deploy on pushes to main (data file changes trigger redeploy)
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest station data
        env:
          NLR_API_KEY: ${{ secrets.NLR_API_KEY }}
        run: npm run fetch-stations

      - name: Check for data changes
        id: diff
        run: |
          git diff --quiet public/data/stations.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stations.json
          git commit -m "chore: update station data [$(date -u '+%Y-%m-%d')]"
          git push

      - name: Build app
        run: npm run build
        env:
          VITE_BASE_PATH: /choice-ev-map/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
